steps:
  # Build image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-northeast1-docker.pkg.dev/vaorder/vaorder/app:$COMMIT_SHA', '.']

  # Push image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-northeast1-docker.pkg.dev/vaorder/vaorder/app:$COMMIT_SHA']

  # Deploy bot service
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'vaorder-bot'
      - '--image=asia-northeast1-docker.pkg.dev/vaorder/vaorder/app:$COMMIT_SHA'
      - '--region=asia-northeast1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--command=python'
      - '--args=-m,bot.main'
      - '--min-instances=1'
      - '--max-instances=1'
      - '--memory=512Mi'
      - '--set-env-vars=TELEGRAM_TOKEN=8951254582:AAFm5KEjSim-RhfIrh3yS04YUbAihEaNOE0,TELEGRAM_USER_ID=1081559358,ANTHROPIC_API_KEY=sk-40016bfa06a5222fc92e02761de1515319f5043e4cd53a2032ba562e6f966e3e,ANTHROPIC_AUTH_TOKEN=sk-40016bfa06a5222fc92e02761de1515319f5043e4cd53a2032ba562e6f966e3e,ANTHROPIC_BASE_URL=https://api.coffeevibeai.com,DATABASE_URL=postgresql://postgres.yczylsdyznfklxkmnihj:dockaz-0xocvu-wustaR@aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres'

  # Xóa revision cũ của bot (chỉ giữ revision mới nhất) để tránh Conflict polling
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        OLD=$$(gcloud run revisions list --service=vaorder-bot --region=asia-northeast1 --format='value(metadata.name)' | tail -n +2)
        for rev in $$OLD; do
          gcloud run revisions delete $$rev --region=asia-northeast1 --quiet || true
        done

  # Deploy web service
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'vaorder-web'
      - '--image=asia-northeast1-docker.pkg.dev/vaorder/vaorder/app:$COMMIT_SHA'
      - '--region=asia-northeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--command=uvicorn'
      - '--args=web.main:app,--host,0.0.0.0,--port,8080'
      - '--min-instances=0'
      - '--max-instances=1'
      - '--memory=512Mi'
      - '--port=8080'
      - '--set-env-vars=ANTHROPIC_API_KEY=sk-40016bfa06a5222fc92e02761de1515319f5043e4cd53a2032ba562e6f966e3e,ANTHROPIC_AUTH_TOKEN=sk-40016bfa06a5222fc92e02761de1515319f5043e4cd53a2032ba562e6f966e3e,ANTHROPIC_BASE_URL=https://api.coffeevibeai.com,DATABASE_URL=postgresql://postgres.yczylsdyznfklxkmnihj:dockaz-0xocvu-wustaR@aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres'

images:
  - 'asia-northeast1-docker.pkg.dev/vaorder/vaorder/app:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
